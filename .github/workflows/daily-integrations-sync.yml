name: Daily Integrations Sync

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-integrations-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync published integrations sheet
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm run integrations:sync-sheet; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Sync attempt $attempt failed. Retrying..."
              sleep $((attempt * 5))
            fi
          done
          echo "Integrations sheet sync failed after 3 attempts."
          exit 1

      - name: Validate integrations data
        run: npm run integrations:validate

      - name: Build site
        run: npm run build

      - name: Compare generated catalog with live production
        id: compare_live_catalog
        run: node scripts/compare-live-catalog.mjs

      - name: Summarize generated catalog
        shell: bash
        run: |
          node --input-type=module <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import fs from 'node:fs';
          const catalog = JSON.parse(fs.readFileSync('public/integrations.json', 'utf8'));
          const vendorSet = new Set();
          for (const industry of catalog.industries) {
            for (const vendor of industry.vendors) {
              vendorSet.add(vendor.vendor_slug);
            }
          }
          console.log('## Daily Integrations Sync');
          console.log('');
          console.log(`- Generated at: ${catalog.meta.generated_at}`);
          console.log(`- Source mode: ${catalog.meta.source_mode}`);
          console.log(`- Integrations available: ${catalog.meta.record_count}`);
          console.log(`- Industries covered: ${catalog.meta.industry_count}`);
          console.log(`- Vendors available: ${vendorSet.size}`);
          console.log(`- Live integrations available: ${{ steps.compare_live_catalog.outputs.live_record_count }}`);
          console.log(`- Live vendors available: ${{ steps.compare_live_catalog.outputs.live_vendor_count }}`);
          console.log(`- Deploy needed: ${{ steps.compare_live_catalog.outputs.deploy_needed }}`);
          console.log(`- Deploy reason: ${{ steps.compare_live_catalog.outputs.reason }}`);
          EOF

      - name: Determine whether production deploy should run
        id: should_deploy
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.compare_live_catalog.outputs.deploy_needed }}" = "true" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check production deploy configuration
        id: deploy_config
        if: steps.should_deploy.outputs.value == 'true'
        shell: bash
        env:
          CPANEL_DEPLOY_PATH: ${{ secrets.CPANEL_DEPLOY_PATH }}
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP }}
          CPANEL_FTP_PORT: ${{ secrets.CPANEL_FTP_PORT }}
          CPANEL_FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
        run: |
          set -euo pipefail
          CPANEL_DEPLOY_PATH="${CPANEL_DEPLOY_PATH:-.}"
          CPANEL_FTP_HOST="${CPANEL_FTP_HOST:-lastmileinc.ai}"
          CPANEL_FTP_PORT="${CPANEL_FTP_PORT:-21}"
          CPANEL_FTP_USERNAME="${CPANEL_FTP_USERNAME:-rodney@lastmileinc.ai}"

          missing=()
          [[ -n "$CPANEL_FTP_PASSWORD" ]] || missing+=("CPANEL_FTP_PASSWORD")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            printf 'missing=%s\n' "${missing[*]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"
          echo "missing=" >> "$GITHUB_OUTPUT"

      - name: Fail when production deploy is not configured
        if: steps.should_deploy.outputs.value == 'true' && steps.deploy_config.outputs.configured == 'false'
        run: |
          echo "Production catalog differs from the generated catalog, but required deploy secrets are missing: ${{ steps.deploy_config.outputs.missing }}"
          exit 1

      - name: Detect generated catalog changes
        id: detect_changes
        shell: bash
        run: |
          if git diff --quiet -- data/integrations.csv public/integrations.json public/integration-details; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated catalog artifacts
        if: steps.detect_changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git add data/integrations.csv public/integrations.json public/integration-details
          if git diff --cached --quiet; then
            echo "No generated catalog changes to commit."
            exit 0
          fi
          git commit -m "chore: sync integrations catalog"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Install FTPS deploy client
        if: steps.should_deploy.outputs.value == 'true' && steps.deploy_config.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes lftp

      - name: Deploy built site to production
        if: steps.should_deploy.outputs.value == 'true' && steps.deploy_config.outputs.configured == 'true'
        shell: bash
        env:
          CPANEL_DEPLOY_PATH: ${{ secrets.CPANEL_DEPLOY_PATH }}
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP }}
          CPANEL_FTP_PORT: ${{ secrets.CPANEL_FTP_PORT }}
          CPANEL_FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
        run: |
          set -euo pipefail
          CPANEL_DEPLOY_PATH="${CPANEL_DEPLOY_PATH:-.}"
          CPANEL_FTP_HOST="${CPANEL_FTP_HOST:-lastmileinc.ai}"
          CPANEL_FTP_PORT="${CPANEL_FTP_PORT:-21}"
          CPANEL_FTP_USERNAME="${CPANEL_FTP_USERNAME:-rodney@lastmileinc.ai}"
          lftp -u "$CPANEL_FTP_USERNAME","$CPANEL_FTP_PASSWORD" -p "$CPANEL_FTP_PORT" "$CPANEL_FTP_HOST" <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate no
          set net:max-retries 2
          set net:timeout 20
          mirror --reverse --delete --verbose dist "$CPANEL_DEPLOY_PATH"
          bye
          EOF

      - name: Verify live production catalog
        if: steps.should_deploy.outputs.value == 'true' && steps.deploy_config.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if node scripts/compare-live-catalog.mjs --require-match; then
              exit 0
            fi
            echo "Production verification attempt $attempt failed. Retrying..."
            sleep $((attempt * 5))
          done
          echo "Production verification failed after deployment."
          exit 1